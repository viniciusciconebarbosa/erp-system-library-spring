version: '3.8'

services:
    db:
        image: postgres:17-alpine
        container_name: java_db_container
        restart: always
        environment:
                POSTGRES_DB: postgres
                POSTGRES_USER: ${DB_USER:-postgres}
                POSTGRES_PASSWORD: ${DB_PASSWORD}
        command: >
                sh -c "docker-entrypoint.sh postgres &
                sleep 5;
                psql -U postgres -tc \"SELECT 1 FROM pg_database WHERE datname = 'erp_biblioteca'\" | grep -q 1 || psql -U postgres -c \"CREATE DATABASE erp_biblioteca;\";
                wait"
        ports:
            - "5433:5432"
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U postgres" ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - shared_network

    api:
        build: .
        container_name: library-api
        ports:
            - "8080:8080"
        depends_on:
            db:
                condition: service_healthy
        env_file:
            - .env
        environment:
            - SPRING_DATASOURCE_URL=jdbc:postgresql://java_db_container:5432/erp_biblioteca?createDatabaseIfNotExist=true
            - SPRING_DATASOURCE_USERNAME=${DB_USER}
            - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
            - JWT_SECRET=${JWT_SECRET}
            - JWT_EXPIRATION=${JWT_EXPIRATION}
            - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
            - APP_API_BASE_URL=${APP_API_BASE_URL:-http://localhost:8080}
            - SPRING_PROFILES_ACTIVE=prod
            - RABBITMQ_HOST=rabbitmq_hub
            - RABBITMQ_PORT=5672
            - RABBITMQ_USER=admin
            - RABBITMQ_PASS=admin123
        networks:
            - shared_network

networks:
    shared_network:
        external: true
        name: notification_network