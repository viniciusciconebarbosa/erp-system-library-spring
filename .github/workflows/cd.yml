name: CD (Docker)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Entra no diretório (ou cria se não existir)
            mkdir -p /root/erp-system-library-spring
            cd /root/erp-system-library-spring

            # 2. Atualiza o código fonte
            if [ -d ".git" ]; then
              git pull origin master
            else
              git clone https://github.com/viniciusciconebarbosa/erp-system-library-spring.git .
            fi

            # 3. Cria o arquivo .env a partir das Secrets do GitHub
            cat > .env << EOL
            DB_URL=jdbc:mysql://db:3306/erp_biblioteca?createDatabaseIfNotExist=true
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}
            STORAGE_UPLOAD_DIR=uploads/capas
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
            APP_API_BASE_URL=${{ secrets.APP_API_BASE_URL }}
            EOL

            # 4. Para o serviço antigo do systemd (apenas na primeira vez)
            sudo systemctl stop biblioteca-api || true
            sudo systemctl disable biblioteca-api || true

            # 5. Sobe o ambiente com Docker
            docker-compose down
            docker-compose up -d --build