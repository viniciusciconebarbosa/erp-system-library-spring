name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: biblioteca-api
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Prepare directory on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            mkdir -p /root/biblioteca-api/uploads/capas
            chmod -R 755 /root/biblioteca-api/uploads
            # Limpa o JAR antigo para evitar conflitos
            rm -f /root/biblioteca-api/*.jar || true

      - name: Copy initial images to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "uploads/capas/"
          target: "/root/biblioteca-api/uploads/"
          strip_components: 1

      - name: Copy JAR to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "*.jar"
          target: "/root/biblioteca-api/"

      - name: Setup and Start Service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /root/biblioteca-api
            mv *.jar biblioteca-api.jar || true
            sudo systemctl stop biblioteca-api || true
            
            cat > /root/biblioteca-api/.env << EOL
            DB_URL=jdbc:mysql://${{ secrets.DB_HOST }}:3306/erp_biblioteca?createDatabaseIfNotExist=true
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}
            SPRING_PROFILES_ACTIVE=prod
            EOL
            
            sudo tee /etc/systemd/system/biblioteca-api.service << EOL
            [Unit]
            Description=Biblioteca API
            After=network.target
            
            [Service]
            User=root
            WorkingDirectory=/root/biblioteca-api
            EnvironmentFile=/root/biblioteca-api/.env
            ExecStart=/usr/bin/java -jar biblioteca-api.jar
            SuccessExitStatus=143
            TimeoutStopSec=10
            Restart=on-failure
            RestartSec=5
            
            [Install]
            WantedBy=multi-user.target
            EOL
            
            sudo systemctl daemon-reload
            sudo systemctl enable biblioteca-api
            sudo systemctl start biblioteca-api
            sudo systemctl status biblioteca-api --no-pager
